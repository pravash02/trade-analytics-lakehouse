trade_analytics:
  target: dev
  outputs:
    dev:
      type:      databricks
      catalog:   "{{ env_var('UC_CATALOG', 'workspace') }}"
      schema:    "{{ env_var('DBT_SCHEMA', 'trade_analytics_gold') }}"
      host:      "{{ env_var('DATABRICKS_HOST') }}"
      http_path: "{{ env_var('DATABRICKS_HTTP_PATH') }}"
      token:     "{{ env_var('DATABRICKS_TOKEN') }}"
      threads:   4