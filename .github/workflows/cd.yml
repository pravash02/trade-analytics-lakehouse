name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.12"

jobs:

  lint:
    name: Lint (ruff + mypy)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: ruff lint
        run: ruff check src/ tests/
      
      - name: ruff format (auto-fix)
        run: ruff format src/ tests/

      - name: Commit formatted files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet || (git add src/ tests/ && git commit -m "style: auto-format via ruff [skip ci]" && git push)

      - name: ruff format check
        run: ruff format --check src/ tests/

      - name: mypy type check
        run: mypy src/trade_analytics/
        continue-on-error: true    # warnings only — don't fail CI on type hints

  test:
    name: Pytest
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Set SPARK_ENV=local
        run: echo "SPARK_ENV=local" >> $GITHUB_ENV

      - name: Run pytest
        run: |
          pytest tests/ -v \
            --cov=src/trade_analytics \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --tb=short

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  dbt-compile:
    name: dbt compile
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dbt-databricks
        run: pip install dbt-databricks

      - name: dbt compile (SQL syntax validation)
        ## Uses a dummy profile — compile only validates SQL, no DB connection needed
        env:
          DATABRICKS_HOST:      "https://dummy.azuredatabricks.net"
          DATABRICKS_TOKEN:     "dummy_token_for_compile_only"
          DATABRICKS_HTTP_PATH: "/sql/1.0/warehouses/dummy"
        run: |
          cd dbt_project
          dbt compile --profiles-dir . 2>&1
        continue-on-error: false

  wheel:
    name: Build wheel
    runs-on: ubuntu-latest
    needs: [test, dbt-compile]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install build
        run: pip install build

      - name: Build wheel
        run: python -m build --wheel --outdir dist/

      - name: Verify wheel contents
        run: |
          pip install wheel
          python -c "
          import zipfile, sys, os
          wheels = [f for f in os.listdir('dist') if f.endswith('.whl')]
          if not wheels:
              print('ERROR: no wheel found in dist/')
              sys.exit(1)
          whl = wheels[0]
          print(f'Wheel: {whl}')
          with zipfile.ZipFile(f'dist/{whl}') as z:
              names = z.namelist()
              print(f'Files in wheel: {len(names)}')
              # Verify key modules are packaged
              required = [
                  'trade_analytics/config/settings.py',
                  'trade_analytics/config/enums.py',
                  'trade_analytics/config/utils.py',
                  'trade_analytics/config/spark_session.py',
              ]
              for r in required:
                  if not any(r in n for n in names):
                      print(f'MISSING from wheel: {r}')
                      sys.exit(1)
                  else:
                      print(f'  OK: {r}')
          print('Wheel verification passed ✓')
          "

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: trade-analytics-wheel
          path: dist/*.whl
          retention-days: 7