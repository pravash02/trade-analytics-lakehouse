bundle:
  name: trade-analytics-lakehouse

include:
  - deploy/targets/TARGET/settings.yml
  - deploy/resources/*.yml

sync:
  include:
    - databricks_notebooks/
    - dbt_project/
    - deploy/resources/
  exclude:
    - ".*"
    - "**/__pycache__/**"
    - "**/*.pyc"
    - "**/*.egg-info/**"
    - "deploy/main_deploy/**"
    - "deploy/targets/**"
    - "databricks.yml"
    - "delta/**"
    - "venv/**"
    - ".venv/**"
    - "tests/**"
    - "dist/**"
    - "*.whl"

variables:
  org_id:
    description: "Databricks workspace org ID (used for direct links)"
    default: ""

  pat_token:
    description: "Personal Access Token (DEV only — injected from DATABRICKS_TOKEN env var in CI)"
    default: ""

  workspace_host:
    description: "Databricks workspace URL (https://...)"
    default: ""

  cluster_id:
    description: "Interactive cluster ID (used for notebook tasks)"
    default: ""

  warehouse_id:
    description: "SQL Warehouse ID (used for dbt HTTP path)"
    default: ""

  http_path:
    description: "SQL Warehouse HTTP path for dbt-databricks"
    default: ""

  uc_catalog:
    description: "Unity Catalog catalog name"
    default: "workspace"

  uc_schema:
    description: "Unity Catalog schema name"
    default: "default"

  uc_volume:
    description: "Unity Catalog volume name"
    default: "trade-analytics"

  wheel_path:
    description: "DBFS/Volume path where the built wheel is uploaded"
    default: "/Volumes/workspace/default/trade-analytics/wheels/trade_analytics-latest.whl"

  dbt_schema:
    description: "dbt target schema in Unity Catalog"
    default: "trade_analytics_dev"

  dbt_threads:
    description: "dbt parallelism"
    default: "4"

  alert_email:
    description: "Email address for job failure notifications"
    default: "pravash.cse@gmail.com"

  auth_strategy:
    description: "Auth strategy: pat | spn"
    default: "pat"

  namespace:
    description: "Vault namespace"
    default: ""

  vault_url:
    description: "HashiCorp Vault URL"
    default: ""

  secret_path:
    description: "Vault secret path for SPN creds"
    default: ""

  cert_role:
    description: "Vault cert role name"
    default: ""

  cert_path:
    description: "TLS client cert path on the runner"
    default: ""

  cert_key_path:
    description: "TLS client private key path on the runner"
    default: ""

targets:
  TARGET:
    mode: development
    default: true
    workspace:
      host: ${var.workspace_host}